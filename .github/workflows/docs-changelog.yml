name: Docs — runbook changelog

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-changelog
  cancel-in-progress: false

jobs:
  append-entry:
    runs-on: ubuntu-latest
    # Avoid infinite loops: skip when this workflow itself authored the commit.
    if: github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate runbook entry
        id: generate
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/generate_runbook_entry.py

      - name: Commit and push new entry
        if: steps.generate.outputs.post_path != ''
        env:
          POST_PATH: ${{ steps.generate.outputs.post_path }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$POST_PATH"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "docs(runbook): log ${GITHUB_SHA::7} [skip ci]"
          # Retry push to absorb transient network failures.
          for attempt in 1 2 3 4; do
            if git push origin HEAD:${GITHUB_REF_NAME}; then
              exit 0
            fi
            sleep $((2 ** attempt))
          done
          echo "Push failed after retries" >&2
          exit 1
