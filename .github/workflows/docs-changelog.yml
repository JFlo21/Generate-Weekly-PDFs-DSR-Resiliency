name: Docs — runbook changelog

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-changelog
  cancel-in-progress: false

jobs:
  append-entry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Belt-and-suspenders loop protection: skip when this workflow itself
    # authored the triggering commit. GitHub also prevents GITHUB_TOKEN-
    # authored pushes from re-triggering push workflows, and our post-
    # generator short-circuits if only website/blog/ changed.
    if: github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate runbook entry
        id: generate
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          log="$(mktemp)"
          python scripts/generate_runbook_entry.py | tee "$log"
          post_path="$(awk -F= '/^POST_PATH=/{print $2; exit}' "$log")"
          if [ -n "$post_path" ]; then
            printf 'post_path=%s\n' "$post_path" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute short SHA
        id: sha
        if: steps.generate.outputs.post_path != ''
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Open pull request with runbook entry
        id: open_pr
        if: steps.generate.outputs.post_path != ''
        uses: peter-evans/create-pull-request@v6
        with:
          # Using the default GITHUB_TOKEN means the resulting PR does not
          # re-trigger push/pull_request workflows (a built-in GitHub safety)
          # — that's exactly what we want here.
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs(runbook): log ${{ steps.sha.outputs.short }} [skip ci]"
          title: "docs(runbook): change-log entry for ${{ steps.sha.outputs.short }}"
          body: |
            Auto-generated runbook entry for commit
            [`${{ steps.sha.outputs.short }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            on `${{ github.ref_name }}`.

            This PR only adds a Markdown file under `website/blog/`. Safe to
            merge once it looks reasonable — merging will redeploy the
            Docusaurus site via Vercel.

            Generated by
            [`.github/workflows/docs-changelog.yml`](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/.github/workflows/docs-changelog.yml).
          branch: runbook/log-${{ steps.sha.outputs.short }}
          base: ${{ github.ref_name }}
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          labels: |
            documentation
            auto-generated
          delete-branch: true
          add-paths: |
            website/blog/**

      - name: Summarize
        if: always()
        env:
          POST_PATH: ${{ steps.generate.outputs.post_path }}
          PR_URL: ${{ steps.open_pr.outputs.pull-request-url }}
        run: |
          if [ -n "${POST_PATH:-}" ]; then
            echo "Generated: ${POST_PATH}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No runbook entry generated (empty diff, skip marker, or blog-only push)." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${PR_URL:-}" ]; then
            echo "PR: ${PR_URL}" >> "$GITHUB_STEP_SUMMARY"
          fi
