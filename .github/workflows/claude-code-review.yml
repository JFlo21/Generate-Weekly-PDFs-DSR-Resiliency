name: Claude Code — PR Auto-Update

# Triggered by @claude mentions in PR comments / reviews, or when a reviewer
# requests changes. Claude reads the review feedback, applies code edits, and
# pushes them back to the PR branch.
#
# Security design:
#   - Trigger only on comment/review events — NOT on every pull_request push
#     (that would spend Anthropic API quota and grant privileged checkout on
#     every sync with no operator intent).
#   - Require author_association ∈ {OWNER, MEMBER, COLLABORATOR} so an
#     external commenter cannot invoke the privileged path.
#   - Resolve the PR head via GitHub API (not `github.event.pull_request.head`,
#     which is empty for issue_comment) and refuse to run if the head repo is
#     not this repository — blocks fork-PR supply-chain attacks.
#   - Check out the resolved head SHA (immutable), not a mutable branch ref.
#
# See CLAUDE.md and .github/copilot-instructions.md for the project
# conventions Claude should respect while editing.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write          # Claude pushes commits back to the PR branch
  pull-requests: write     # Claude posts replies / updates PR body
  issues: write            # Needed for issue_comment events on PRs
  # id-token is intentionally NOT granted — this workflow does not use OIDC.

concurrency:
  group: claude-pr-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: false

jobs:
  claude:
    # Gate by event + trigger phrase + trusted author. We keep the checks
    # simple and readable; the heavy fork-PR check happens inside the
    # `Resolve PR metadata` step below, where we actually have the data.
    if: >-
      (github.event.sender.type != 'Bot') &&
      (
        (github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          contains(github.event.comment.body, '@claude') &&
          (github.event.comment.author_association == 'OWNER' ||
           github.event.comment.author_association == 'MEMBER' ||
           github.event.comment.author_association == 'COLLABORATOR')) ||
        (github.event_name == 'pull_request_review_comment' &&
          contains(github.event.comment.body, '@claude') &&
          (github.event.comment.author_association == 'OWNER' ||
           github.event.comment.author_association == 'MEMBER' ||
           github.event.comment.author_association == 'COLLABORATOR')) ||
        (github.event_name == 'pull_request_review' &&
          (contains(github.event.review.body, '@claude') ||
           github.event.review.state == 'changes_requested') &&
          (github.event.review.author_association == 'OWNER' ||
           github.event.review.author_association == 'MEMBER' ||
           github.event.review.author_association == 'COLLABORATOR'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve PR metadata (head ref, head sha, head repo)
        id: pr
        # For issue_comment events, `github.event.pull_request.head.ref` and
        # `github.head_ref` are both empty — checkout would silently fall back
        # to the default branch and Claude would edit master. We resolve the
        # head via the REST API using the PR number (available on all event
        # types this workflow listens to) and validate the head repo matches
        # this repository before emitting any outputs.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          set -euo pipefail
          pr_json=$(gh api "repos/$REPO/pulls/$PR_NUMBER")
          head_ref=$(printf '%s' "$pr_json" | jq -r '.head.ref')
          head_sha=$(printf '%s' "$pr_json" | jq -r '.head.sha')
          head_repo=$(printf '%s' "$pr_json" | jq -r '.head.repo.full_name')

          if [ "$head_repo" != "$REPO" ]; then
            printf '::warning::Skipping Claude auto-update: PR head is in fork repo %s, not %s\n' \
              "$head_repo" "$REPO"
            {
              printf 'skip=true\n'
              printf 'pr_number=%s\n' "$PR_NUMBER"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            printf 'skip=false\n'
            printf 'pr_number=%s\n' "$PR_NUMBER"
            printf 'head_ref=%s\n' "$head_ref"
            printf 'head_sha=%s\n' "$head_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout PR head (by SHA, immutable)
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          # Checking out the resolved SHA (not a mutable branch name) closes
          # the TOCTOU window between the author_association gate and the
          # actual checkout that CodeQL warned about.
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.12
        if: steps.pr.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          # Match the primary CI workflow (weekly-excel-generation.yml) so
          # any `pytest tests/` run here reproduces production behavior.
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        if: steps.pr.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js 20
        if: steps.pr.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Claude Code
        if: steps.pr.outputs.skip != 'true'
        # Pinned to the stable v1 major-version tag rather than the mutable
        # `@beta` ref, since this workflow runs with `contents: write` and
        # access to the Anthropic API key — any change to the action code
        # warrants an explicit bump here.
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Trigger phrase in comments (default is @claude). Reviews that are
          # "changes_requested" also invoke Claude even without the phrase.
          trigger_phrase: "@claude"
          # Claude must follow repo conventions documented in CLAUDE.md:
          #   - Surgical edits, no refactor of untouched code
          #   - Conventional Commits subject ≤ 50 chars
          #   - Never break generate_weekly_pdfs.py production logic
          #   - Run pytest tests/ before pushing (pre-push parity)
          #   - Append Living Ledger entry if introducing a new standard
          direct_prompt: |
            You are running inside PR #${{ steps.pr.outputs.pr_number }}
            on branch `${{ steps.pr.outputs.head_ref }}` (SHA
            `${{ steps.pr.outputs.head_sha }}`).

            Read CLAUDE.md and .github/copilot-instructions.md before editing.

            For review feedback:
            1. Address each actionable comment with the minimum necessary
               change — do NOT refactor code the reviewer didn't flag.
            2. Preserve the production pipeline in generate_weekly_pdfs.py.
               Never lower PARALLEL_WORKERS guards, never drop the
               foreman/dept/job keys from the hash-detection tuple.
            3. Run `pytest tests/ -v` locally before pushing. If any test
               fails, fix it rather than bypassing.
            4. Commit with Conventional Commits (`fix:`, `refactor:`, etc.),
               subject ≤ 50 chars, detailed body for non-trivial changes.
            5. If a new architectural standard emerged from this review,
               append an entry under CLAUDE.md → Living Ledger with a
               `[YYYY-MM-DD HH:MM]` timestamp in the same commit.
            6. Reply on the review thread summarising what you changed and
               anything you deliberately did not change (with reasoning).

            If you cannot confidently apply a change (ambiguous feedback,
            architectural decision needed, or blocked by missing context),
            post a clarifying reply instead of guessing.
          # Scope Node commands to the correct subdirectory — there is no
          # root package.json; Node projects live under portal/, portal-v2/,
          # and website/.
          allowed_tools: >-
            Bash(pytest tests/ -v),
            Bash(pytest tests/ -q),
            Bash(python -m py_compile generate_weekly_pdfs.py),
            Bash(cd portal && npm ci),
            Bash(cd portal && npm test),
            Bash(cd portal-v2 && npm ci),
            Bash(cd portal-v2 && npm run lint),
            Bash(cd portal-v2 && npm run build),
            Bash(cd website && npm ci),
            Bash(cd website && npm run build),
            Bash(cd website && npm run typecheck),
            Bash(git status),
            Bash(git diff),
            Bash(git log --oneline -20)

      - name: Summarize
        if: always()
        # Security: pass untrusted refs (branch names, PR numbers) through env
        # instead of interpolating them directly into the shell script body.
        # Direct `${{ ... }}` interpolation into `run:` is a classic GitHub
        # Actions code-injection sink (CodeQL js/actions/command-injection).
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          SKIPPED: ${{ steps.pr.outputs.skip }}
        run: |
          {
            printf '## Claude PR Auto-Update\n'
            printf -- '- Event: `%s`\n' "$EVENT_NAME"
            printf -- '- PR: #%s\n' "$PR_NUMBER"
            if [ "$SKIPPED" = "true" ]; then
              printf -- '- Status: skipped (fork PR or missing metadata)\n'
            else
              printf -- '- Branch: `%s`\n' "$HEAD_REF"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
